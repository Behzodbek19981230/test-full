# www → non-www 301 redirect
server {
    listen 80;
    server_name www.test-market.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    return 301 $scheme://test-market.uz$request_uri;
}

# Frontend: test-market.uz
server {
    listen 80;
    server_name test-market.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin: admin.test-market.uz (static files)
server {
    listen 80;
    server_name admin.test-market.uz;

    root /var/www/test-full/admin/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Backend API: api.test-market.uz
server {
    listen 80;
    server_name api.test-market.uz;

    client_max_body_size 55M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
