name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/test-full
            git pull origin main

            # Backend
            cd /var/www/test-full/backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            sudo systemctl restart test-backend

            # Frontend
            cd /var/www/test-full/frontend
            npm ci
            NEXT_PUBLIC_API_URL=https://api.test-market.uz npm run build
            sudo systemctl restart test-frontend

            # Admin (static files - nginx serves directly)
            cd /var/www/test-full/admin
            npm ci
            VITE_API_URL=https://api.test-market.uz npm run build
            sudo systemctl reload nginx
