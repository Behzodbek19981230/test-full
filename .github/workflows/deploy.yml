name: Deploy to Production

on:
    push:
        branches:
            - main

env:
    PROJECT_PATH: /var/www/test-full

jobs:
    backend:
        name: Deploy Backend
        runs-on: ubuntu-latest

        steps:
            - name: Deploy Backend via SSH
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  password: ${{ secrets.SSH_PASSWORD }}
                  script: |
                      cd ${{ env.PROJECT_PATH }}

                      git fetch origin
                      git reset --hard origin/main

                      cd backend

                      source venv/bin/activate

                      pip install -r requirements.txt

                      alembic upgrade head
                      export NVM_DIR="/root/.nvm"
                      source "$NVM_DIR/nvm.sh"

                      nvm use 22

                      pm2 restart test-backend

    frontend:
        name: Deploy Frontend
        runs-on: ubuntu-latest
        needs: backend

        steps:
            - name: Deploy Frontend via SSH
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  password: ${{ secrets.SSH_PASSWORD }}
                  script: |
                      export NVM_DIR="$HOME/.nvm"
                      source "$NVM_DIR/nvm.sh"

                      nvm use 22

                      cd ${{ env.PROJECT_PATH }}

                      git fetch origin
                      git reset --hard origin/main

                      cd frontend

                      npm install

                      npm run build

                      pm2 restart test-frontend

    admin:
        name: Deploy Admin
        runs-on: ubuntu-latest
        needs: backend

        steps:
            - name: Deploy Admin via SSH
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  password: ${{ secrets.SSH_PASSWORD }}
                  script: |
                      export NVM_DIR="$HOME/.nvm"
                      source "$NVM_DIR/nvm.sh"

                      nvm use 22

                      cd ${{ env.PROJECT_PATH }}

                      git fetch origin
                      git reset --hard origin/main

                      cd admin

                      npm install

                      VITE_API_URL=https://api.test-market.uz npm run build

                      sudo nginx -t

                      sudo systemctl reload nginx
